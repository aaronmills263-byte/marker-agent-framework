name: Nightly Evals

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:

# Required secrets (documented here even if not yet consumed):
# - ANTHROPIC_API_KEY: For LLM-rubric eval assertions
# - SUPABASE_SERVICE_ROLE_KEY: For Marmalade tenant storage access

jobs:
  evals:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @marker/evals run eval:all
        id: evals

  open-issue-on-failure:
    runs-on: ubuntu-latest
    needs: evals
    if: failure()
    steps:
      - uses: actions/checkout@v4
      - name: Open regression issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Eval regression: nightly run ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Eval Regression Detected',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Triggered:** ${new Date().toISOString()}`,
              '',
              'The nightly eval suite failed. Please investigate the failing scenarios.',
              '',
              '---',
              '_Auto-opened by nightly-evals workflow_',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['eval-regression', 'automated'],
            });
